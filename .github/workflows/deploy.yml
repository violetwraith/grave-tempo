name: build n deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  GODOT_VERSION: "4.6"
  GODOT_STATUS: "stable"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot binaries
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/godot
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}

      - name: Install Godot and export templates
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          FNAME="Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/${FNAME}.zip"
          unzip -q "${FNAME}.zip"
          sudo mv "${FNAME}" /usr/local/bin/godot

          TNAME="Godot_v${GODOT_VERSION}-${GODOT_STATUS}_export_templates.tpz"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/${TNAME}"
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          unzip -q "${TNAME}" -d /tmp/godot_templates
          mv /tmp/godot_templates/templates/* "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}/"

      - name: Import project assets
        run: godot --headless --import 2>&1 || true

      - name: Export Web build
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" "$PWD/build/web/index.html" 2>&1

      - name: Fix SharedArrayBuffer for GitHub Pages
        run: |
          wget -q https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.js \
            -O build/web/coi-serviceworker.js
          sed -i 's|<head>|<head><script src="coi-serviceworker.js"></script>|' build/web/index.html
          touch build/web/.nojekyll

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
